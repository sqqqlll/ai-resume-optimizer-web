# AI简历优化器 - docker-compose 一键启动
# 用法：docker-compose up -d

version: "3.8"

services:
  resume-optimizer:
    build: .
    container_name: ai-resume-optimizer
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
